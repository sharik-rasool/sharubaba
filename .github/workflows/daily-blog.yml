name: Daily Blog Generator

on:
  schedule:
    # Runs daily at 1:00 AM UTC (6:30 AM IST)
    - cron: '30 1 * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions UI tab
    inputs:
      limit:
        description: 'Number of blogs to write'
        required: false
        default: '1'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Blog Automation
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_KEYWORDS_SHEET_URL: ${{ secrets.GOOGLE_KEYWORDS_SHEET_URL }}
          GOOGLE_KEYWORDS_SHEET_WEBHOOK_URL: ${{ secrets.GOOGLE_KEYWORDS_SHEET_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npx tsx scripts/run-blog-automation.ts --limit ${{ github.event.inputs.limit }}
          else
            npx tsx scripts/run-blog-automation.ts --limit 1
          fi
